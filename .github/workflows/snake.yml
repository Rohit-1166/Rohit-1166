name: Generate Snake Animation

on:
  # Run automatically every 24 hours
  schedule:
    - cron: "0 0 * * *" 
  
  # Allow manual trigger
  workflow_dispatch:
  
  # Run on pushes to the main branch (adjust if your default branch is 'master')
  push:
    branches:
    - main
    
jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Output to the dist folder, with custom dark luxury theme colors
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00D4FF&color_dots=#161B22,#2B1D4A,#4D2A82,#6C63FF,#8A2BE2

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          # This pushes the contents of the 'dist' folder to the 'output' branch
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
